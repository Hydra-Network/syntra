<body></body>
<script>
  window.onload = async () => {
    let file_name = localStorage.getItem("gName");
    try {
      let response = await fetch(
        `https://raw.githubusercontent.com/Hydra-Network/hydra-assets/refs/heads/main/gmes/${file_name}`,
      );
      console.log(response);
      let text = await response.text();
      console.log(text);
      document.body.innerHTML = "";
      const range = document.createRange();
      const fragment = range.createContextualFragment(text);
      document.body.appendChild(fragment);

      console.log("Game loaded!");
    } catch (err) {
      console.error("Error fetching game file:", err);
    }
  };
</script>
